<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መራሔ ፍኖት - የ21 ቀን መንፈሳዊ ጉዞ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            color: white;
            padding: 20px 0;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.3);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
        }

        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: right;
        }

        .day-title {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            margin-bottom: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .task-item:last-child { border-bottom: none; }

        .task-item input {
            margin-left: 15px;
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
        }

        .task-item i {
            margin-left: 10px;
            color: var(--primary);
            width: 25px;
            text-align: center;
        }

        footer {
            color: white;
            padding: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>መራሔ ፍኖት</h1>
        <p>የ21 ቀን መንፈሳዊ የሕይወት ለውጥ</p>
    </header>

    <div class="progress-container">
        <div style="color: white; font-weight: bold;">የጉዞው ሂደት: <span id="progress-text">0%</span></div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="challenge-container"></div>

    <footer>
        <p>© 2026 መራሔ ፍኖት - ለተሻለ መንፈሳዊ ሕይወት</p>
    </footer>
</div>

<script>
    const tasks = [
        { id: 'bible', label: 'መጽሐፍ ቅዱስ ማንበብ', icon: 'fa-book-bible' },
        { id: 'prayer', label: 'ጸሎት ማድረግ', icon: 'fa-hands-praying' },
        { id: 'prostration', label: 'ስግደት', icon: 'fa-person-praying' },
        { id: 'alms', label: 'የዕለት ምጽዋት', icon: 'fa-hand-holding-heart' },
        { id: 'media', label: 'መንፈሳዊ ትምህርት/መዝሙር', icon: 'fa-clapperboard' }
    ];

    const container = document.getElementById('challenge-container');

    for (let day = 1; day <= 21; day++) {
        const card = document.createElement('div');
        card.className = 'day-card';
        
        let html = `<div class="day-title">ቀን ${day}</div>`;
        tasks.forEach(task => {
            const taskId = `d${day}-${task.id}`;
            const checked = localStorage.getItem(taskId) === 'true' ? 'checked' : '';
            html += `
                <div class="task-item" onclick="toggleTask('${taskId}')">
                    <span>${task.label}</span>
                    <i class="fas ${task.icon}"></i>
                    <input type="checkbox" id="${taskId}" ${checked} onclick="event.stopPropagation(); updateState('${taskId}', this.checked)">
                </div>
            `;
        });
        card.innerHTML = html;
        container.appendChild(card);
    }

    function toggleTask(id) {
        const el = document.getElementById(id);
        el.checked = !el.checked;
        updateState(id, el.checked);
    }

    function updateState(id, isChecked) {
        localStorage.setItem(id, isChecked);
        updateProgress();
    }

    function updateProgress() {
        const total = 21 * 5;
        let checkedCount = 0;
        for (let i = 1; i <= 21; i++) {
            tasks.forEach(t => {
                if(localStorage.getItem(`d${i}-${t.id}`) === 'true') checkedCount++;
            });
        }
        const percent = Math.round((checkedCount / total) * 100);
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('progress-text').innerText = percent + '%';
    }

    updateProgress();
</script>

</body>
</html>
